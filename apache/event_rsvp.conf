# Apache virtual host for the Django RSVP site (mod_wsgi)
#
# Usage (Ubuntu/Debian example):
# 1) sudo apt install apache2 libapache2-mod-wsgi-py3
# 2) sudo a2enmod wsgi ssl headers rewrite
# 3) sudo cp /home/afineman/work/event/apache/event_rsvp.conf /etc/apache2/sites-available/event_rsvp.conf
# 4) sudo a2ensite event_rsvp.conf
# 5) sudo systemctl reload apache2
#
# Set certificate file paths before enabling this site.

<VirtualHost *:80>
    ServerName invite.afineman.com
    ServerAdmin webmaster@localhost

    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName invite.afineman.com
    ServerAdmin webmaster@localhost

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/invite.afineman.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/invite.afineman.com/privkey.pem

    # Run Django inside this project's virtualenv.
    WSGIDaemonProcess event_rsvp \
        python-home=/home/afineman/work/event/venv \
        python-path=/home/afineman/work/event \
        processes=2 threads=15 display-name=%{GROUP}
    WSGIProcessGroup event_rsvp
    WSGIApplicationGroup %{GLOBAL}

    # Point Apache to the Django WSGI entrypoint.
    WSGIScriptAlias / /home/afineman/work/event/event_rsvp/wsgi.py

    <Directory /home/afineman/work/event/event_rsvp>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # Static files served directly by Apache.
    # Ensure STATIC_ROOT points to this directory and run collectstatic.
    Alias /static/ /home/afineman/work/event/staticfiles/
    <Directory /home/afineman/work/event/staticfiles>
        Require all granted
    </Directory>

    # Optional media uploads path.
    Alias /media/ /home/afineman/work/event/media/
    <Directory /home/afineman/work/event/media>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/event_rsvp_error.log
    CustomLog ${APACHE_LOG_DIR}/event_rsvp_access.log combined
</VirtualHost>
